services:
  docs:
    image: legal_information_assistance_system_local_docs
    container_name: legal_information_assistance_system_local_docs
    build:
      context: .
      dockerfile: ./compose/local/docs/Dockerfile
    env_file:
      - ./.envs/.local/.django
    volumes:
      - /app/.venv
      - ./docs:/docs:z
      - ./config:/app/config:z
      - ./legal_information_assistance_system:/app/legal_information_assistance_system:z
    ports:
      - '9000:9000'
    command: /start-docs
